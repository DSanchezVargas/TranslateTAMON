<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TranslateTAMON</title>
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #1f2937;
      --muted: #5b6472;
      --card: #fffaf2;
      --line: #d5c8b7;
      --accent: #1f7a5a;
      --accent-2: #c14f2b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, #e8dcc8 0%, transparent 40%),
        radial-gradient(circle at 80% 10%, #e7f0de 0%, transparent 42%),
        radial-gradient(circle at 75% 80%, #f5d7cf 0%, transparent 45%),
        var(--bg);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      background: rgba(255, 250, 242, 0.92);
      backdrop-filter: blur(3px);
      box-shadow: 0 16px 34px rgba(31, 41, 55, 0.1);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.8rem);
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 70ch;
    }

    .grid {
      display: grid;
      gap: 16px;
      margin-top: 18px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: var(--card);
    }

    label {
      font-size: 0.92rem;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input[type="file"], select, input[type="text"], textarea {
      width: 100%;
      border: 1px solid #c8baa6;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
    }

    textarea {
      min-height: 250px;
      resize: vertical;
      line-height: 1.4;
    }

    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }

    .btn-a { background: var(--accent); }
    .btn-b { background: var(--accent-2); }
    .btn-c { background: #374151; }

    .status {
      margin-top: 10px;
      min-height: 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .progress-wrap {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e7dccf;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1f7a5a, #3aa078);
      transition: width 0.4s ease;
    }

    .history-panel {
      margin-top: 10px;
      border-top: 1px dashed var(--line);
      padding-top: 8px;
    }

    .history-item {
      margin-top: 7px;
    }

    .history-item .label {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .history-track {
      width: 100%;
      height: 7px;
      border-radius: 999px;
      background: #e7dccf;
      overflow: hidden;
    }

    .history-fill {
      height: 100%;
      background: #374151;
      width: 0%;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid var(--line);
      color: #4b5563;
      background: #fff;
      margin-bottom: 8px;
    }

    @media (max-width: 900px) {
      .grid, .row { grid-template-columns: 1fr; }
      body { padding: 14px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="pill">TranslateTAMON AI</span>
      <h1>Tu pagina de traduccion ya esta activa</h1>
      <p class="sub">Sube un PDF, DOCX o imagen, genera vista previa y ajusta el texto antes de descargar el DOCX final.</p>

      <div class="grid">
        <article class="card">
          <label for="document">Documento</label>
          <input id="document" name="document" type="file" accept=".pdf,.docx,.jpg,.jpeg,.png">

          <div class="row" style="margin-top: 10px;">
            <div>
              <label for="sourceLanguage">Idioma origen</label>
              <select id="sourceLanguage" name="sourceLanguage">
                <option value="en">English</option>
                <option value="es" selected>Espanol</option>
                <option value="pt">Portugues</option>
                <option value="fr">Frances</option>
                <option value="de">Aleman</option>
                <option value="it">Italiano</option>
              </select>
            </div>
            <div>
              <label for="targetLanguage">Idioma destino</label>
              <select id="targetLanguage" name="targetLanguage">
                <option value="es">Espanol</option>
                <option value="en" selected>English</option>
                <option value="pt">Portugues</option>
                <option value="fr">Frances</option>
                <option value="de">Aleman</option>
                <option value="it">Italiano</option>
              </select>
            </div>
          </div>

          <div class="row" style="margin-top: 10px;">
            <div>
              <label for="project">Project</label>
              <input id="project" name="project" type="text" value="default" maxlength="120">
            </div>
            <div>
              <label for="domain">Domain</label>
              <input id="domain" name="domain" type="text" value="general" maxlength="120">
            </div>
          </div>

          <div class="actions">
            <button class="btn-a" id="previewBtn" type="button">Generar vista previa</button>
            <button class="btn-c" id="directBtn" type="button">Descargar directo</button>
          </div>

          <div class="progress-wrap">
            <div class="progress-row">
              <span>Progreso de traduccion</span>
              <span id="progressPct">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-row" style="margin-bottom:0;">
              <span id="etaText">Tiempo estimado: --</span>
              <span id="jobState">Sin trabajo activo</span>
            </div>

            <div class="history-panel">
              <div class="progress-row" style="margin-bottom:4px;">
                <span>Historial reciente</span>
                <span id="historyCount">0 trabajos</span>
              </div>
              <div id="historyList"></div>
            </div>
          </div>

          <p class="status" id="status"></p>
        </article>

        <article class="card">
          <label for="translatedText">Texto traducido editable</label>
          <textarea id="translatedText" placeholder="Aqui aparecera la traduccion..."></textarea>
          <div class="actions">
            <button class="btn-b" id="finalizeBtn" type="button">Descargar DOCX final</button>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $('status');
    const translatedTextEl = $('translatedText');
    const progressFillEl = $('progressFill');
    const progressPctEl = $('progressPct');
    const etaTextEl = $('etaText');
    const jobStateEl = $('jobState');
    const historyCountEl = $('historyCount');
    const historyListEl = $('historyList');
    let lastPreviewId = null;
    let lastFileName = null;
    let activeJobPoll = null;

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? '#b42318' : '#5b6472';
    }

    function formatEta(seconds) {
      if (seconds === null || seconds === undefined) return '--';
      const safe = Math.max(0, Math.min(86399, Number(seconds) || 0));
      const hh = Math.floor(safe / 3600);
      const mm = Math.floor((safe % 3600) / 60);
      const ss = safe % 60;
      const parts = [];
      if (hh) parts.push(String(hh) + 'h');
      if (mm || hh) parts.push(String(mm) + 'm');
      parts.push(String(ss) + 's');
      return parts.join(' ');
    }

    function setProgress(percent, etaSeconds, stateText) {
      const safePercent = Math.max(0, Math.min(100, Number(percent) || 0));
      progressFillEl.style.width = safePercent + '%';
      progressPctEl.textContent = Math.round(safePercent) + '%';
      etaTextEl.textContent = 'Tiempo estimado: ' + formatEta(etaSeconds);
      if (stateText) jobStateEl.textContent = stateText;
    }

    function renderJobHistory(items) {
      const list = Array.isArray(items) ? items : [];
      historyCountEl.textContent = list.length + ' trabajos';
      historyListEl.innerHTML = '';

      list.slice(0, 6).forEach((job) => {
        const row = document.createElement('div');
        row.className = 'history-item';

        const label = document.createElement('div');
        label.className = 'label';

        const left = document.createElement('span');
        left.textContent = (job.originalFileName || 'documento') + ' - ' + (job.status || 'desconocido');

        const right = document.createElement('span');
        right.textContent = String(job.progressPercent || 0) + '%';

        label.appendChild(left);
        label.appendChild(right);

        const track = document.createElement('div');
        track.className = 'history-track';
        const fill = document.createElement('div');
        fill.className = 'history-fill';
        fill.style.width = Math.max(0, Math.min(100, Number(job.progressPercent) || 0)) + '%';
        track.appendChild(fill);

        row.appendChild(label);
        row.appendChild(track);
        historyListEl.appendChild(row);
      });
    }

    async function refreshHistory() {
      try {
        const res = await fetch('/api/translate/jobs');
        if (!res.ok) return;
        const jobs = await res.json();
        renderJobHistory(jobs);
      } catch (error) {
        void error;
      }
    }

    async function pollJob(jobId) {
      if (activeJobPoll) {
        clearInterval(activeJobPoll);
        activeJobPoll = null;
      }

      activeJobPoll = setInterval(async () => {
        try {
          const res = await fetch('/api/translate/jobs/' + encodeURIComponent(jobId));
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'No se pudo consultar el trabajo.');

          setProgress(data.progressPercent, data.etaSeconds, data.message || 'Procesando...');
          if (data.translatedTextPartial) {
            translatedTextEl.value = data.translatedTextPartial;
          }

          if (data.status === 'completed') {
            clearInterval(activeJobPoll);
            activeJobPoll = null;
            lastPreviewId = data.previewId || null;
            setStatus('Vista previa lista. Puedes editar y descargar DOCX final.');
            refreshHistory();
          }

          if (data.status === 'failed') {
            clearInterval(activeJobPoll);
            activeJobPoll = null;
            setStatus(data.error || 'La traduccion fallo.', true);
            refreshHistory();
          }
        } catch (error) {
          clearInterval(activeJobPoll);
          activeJobPoll = null;
          setStatus(error.message, true);
          refreshHistory();
        }
      }, 1500);
    }

    function getFormValues() {
      return {
        document: $('document').files[0],
        sourceLanguage: $('sourceLanguage').value,
        targetLanguage: $('targetLanguage').value,
        project: $('project').value || 'default',
        domain: $('domain').value || 'general'
      };
    }

    function downloadBlob(blob, fallbackName) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fallbackName;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function requestPreview() {
      const form = getFormValues();
      if (!form.document) {
        setStatus('Selecciona un archivo primero.', true);
        return;
      }

      const body = new FormData();
      body.append('document', form.document);
      body.append('sourceLanguage', form.sourceLanguage);
      body.append('targetLanguage', form.targetLanguage);
      body.append('project', form.project);
      body.append('domain', form.domain);

      try {
        setStatus('Preparando traduccion asincrona...');
        setProgress(2, null, 'Creando trabajo...');
        const res = await fetch('/api/translate/preview/async', { method: 'POST', body });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error en la vista previa.');

        lastFileName = form.document.name;
        setStatus('Trabajo creado. Traduciendo en segundo plano...');
        refreshHistory();
        await pollJob(data.jobId);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function requestDirectDownload() {
      const form = getFormValues();
      if (!form.document) {
        setStatus('Selecciona un archivo primero.', true);
        return;
      }

      const body = new FormData();
      body.append('document', form.document);
      body.append('sourceLanguage', form.sourceLanguage);
      body.append('targetLanguage', form.targetLanguage);
      body.append('project', form.project);
      body.append('domain', form.domain);

      try {
        setStatus('Traduciendo y generando DOCX...');
        const res = await fetch('/api/translate', { method: 'POST', body });
        if (!res.ok) {
          const data = await res.json().catch(() => ({ error: 'No se pudo traducir.' }));
          throw new Error(data.error || 'No se pudo traducir.');
        }

        const blob = await res.blob();
        const base = (form.document.name || 'documento').replace(/\.[^/.]+$/, '');
        downloadBlob(blob, base + '-' + form.targetLanguage + '.docx');
        setStatus('DOCX generado y descargado.');
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function requestFinalizeDownload() {
      const form = getFormValues();
      const editedText = translatedTextEl.value.trim();
      if (!editedText) {
        setStatus('No hay texto traducido para finalizar.', true);
        return;
      }

      const payload = {
        previewId: lastPreviewId || undefined,
        translatedText: editedText,
        sourceLanguage: form.sourceLanguage,
        targetLanguage: form.targetLanguage,
        originalFileName: lastFileName || form.document?.name || 'documento'
      };

      try {
        setStatus('Generando DOCX final con tus cambios...');
        const res = await fetch('/api/translate/finalize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({ error: 'No se pudo finalizar.' }));
          throw new Error(data.error || 'No se pudo finalizar.');
        }

        const blob = await res.blob();
        const base = (payload.originalFileName || 'documento').replace(/\.[^/.]+$/, '');
        downloadBlob(blob, base + '-' + form.targetLanguage + '.docx');
        setStatus('DOCX final descargado.');
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    $('previewBtn').addEventListener('click', requestPreview);
    $('directBtn').addEventListener('click', requestDirectDownload);
    $('finalizeBtn').addEventListener('click', requestFinalizeDownload);

    refreshHistory();
  </script>
</body>
</html>
